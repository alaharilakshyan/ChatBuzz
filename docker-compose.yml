version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: chatbuzz-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: chatbuzz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chatbuzz-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/chatbuzz
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=chatbuzz_local_secret_default_key_32_bytes_long_required
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
